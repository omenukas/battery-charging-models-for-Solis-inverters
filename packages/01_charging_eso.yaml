###############################################################################
# PACKAGE: 01_charging_eso
# Viskas, kas susiję su ESO likučiu ir tinklo importo/eksporto skaičiavimu
# ir automatizacijomis, kai ESO saugykla pasibaigia
###############################################################################

utility_meter:
  # ŠIO MĖNESIO IMPORTAS IŠ TINKLO
  charging_grid_import_monthly:
    name: "Charging – šio mėnesio importas iš tinklo"
    source: sensor.solis_s6_eh3p_total_energy_imported_from_grid
    cycle: monthly

  # ŠIO MĖNESIO EKSPORTAS Į TINKLĄ
  charging_grid_export_monthly:
    name: "Charging – šio mėnesio eksportas į tinklą"
    source: sensor.solis_s6_eh3p_total_energy_fed_into_grid
    cycle: monthly

input_number:
  # ESO likutis mėnesio pradžioje (įvedamas ranka pagal ESO savitarną)
  charging_eso_balance_month_start:
    name: "Charging – ESO likutis mėnesio pradžioje"
    min: 0
    max: 100000
    step: 1
    unit_of_measurement: "kWh"
    mode: box

  # Baterijos rezervas dienos metu, kai ESO saugykla jau pasibaigusi
  charging_battery_reserve_after_eso:
    name: "Baterijos rezervavimas pasibaigus sukauptai ESO"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: box

  # Kiek krauti bateriją naktį iš tinklo, kai ESO saugykla pasibaigusi
  01_charging_eso_kiek_krauti:
    name: "01_Charging_ESO_kiek_krauti"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:percent
    mode: box

template:
  - sensor:
      #######################################################################
      # ŠIO MĖNESIO NETO IŠ TINKLO (importas - eksportas)
      #######################################################################
      - name: "Charging – šio mėnesio neto iš tinklo"
        unique_id: charging_net_from_grid_this_month
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {% set imp = states('sensor.charging_sio_menesio_importas_is_tinklo') | float(0) %}
          {% set exp = states('sensor.charging_sio_menesio_eksportas_i_tinkla') | float(0) %}
          {{ (imp - exp) | round(2) }}

      #######################################################################
      # ESO LIKUTIS DABAR
      # (mėnesio pradžios likutis – šio mėnesio neto iš tinklo)
      #######################################################################
      - name: "Charging – ESO likutis dabar"
        unique_id: charging_eso_balance_now
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: measurement
        state: >
          {% set start = states('input_number.charging_eso_balance_month_start') | float(0) %}
          {% set imp = states('sensor.charging_sio_menesio_importas_is_tinklo') | float(0) %}
          {% set exp = states('sensor.charging_sio_menesio_eksportas_i_tinkla') | float(0) %}
          {% set net = (imp - exp) %}
          {{ (start - net) | round(2) }}

  - binary_sensor:
      #######################################################################
      # AR ESO „TAUPYKLĖ" JAU BAIGĖSI?
      #######################################################################
      - name: "Charging – ESO sukaupta elektra pasibaigė"
        unique_id: charging_eso_exhausted
        state: >
          {{ states('sensor.charging_eso_likutis_dabar') | float(0) <= 0 }}

      #######################################################################
      # NAKTINIS / DIENINIS TINKLO TARIFAS (su vasaros/žiemos laiku)
      # Vasaros laikas (UTC+3): naktinis 00:00–08:00
      # Žiemos laikas (UTC+2): naktinis 00:00–07:00
      #######################################################################
      - name: "Charging – naktinis tinklo tarifas"
        unique_id: charging_night_tariff
        state: >
          {% set offset = now().strftime('%z') %}
          {% set h = now().hour %}
          {% if offset == '+0300' %}
            {{ h < 8 }}               {# vasaros laikas: 00–07 #}
          {% else %}
            {{ h < 7 }}               {# žiemos laikas: 00–06 #}
          {% endif %}

      - name: "Charging – dieninis tinklo tarifas"
        unique_id: charging_day_tariff
        state: >
          {{ not is_state('binary_sensor.charging_naktinis_tinklo_tarifas', 'on') }}

###############################################################################
# AUTOMATIZACIJOS
###############################################################################

automation:
  ###########################################################################
  # 1) Kai ESO pasibaigia -> išjungiam žiemos režimą, įjungiam rezervinį
  #    baterijos režimą ir nustatom backup SOC iš helperio
  ###########################################################################
  - alias: "Charging – ESO baigėsi: išjungti žiemos režimą"
    id: charging_eso_exhausted_disable_winter_mode
    triggers:
      - trigger: state
        entity_id: binary_sensor.charging_eso_sukaupta_elektra_pasibaige
        to: "on"
    conditions: []
    actions:
      # išjungiam žiemos režimą elektrinei
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.ziemos_rezimas_elektrinei

      # įjungiam rezervinį baterijos režimą
      - action: switch.turn_on
        target:
          entity_id: switch.reserve_battery_mode

      # nustatom backup SOC iš helperio
      - action: input_number.set_value
        target:
          entity_id: input_number.akumuliatoriaus_rezervavimas_vasarai
        data:
          value: "{{ states('input_number.charging_battery_reserve_after_eso') | float(20) }}"
    mode: single

  ###########################################################################
  # 2) Naktinis krovimas, kai ESO saugykla pasibaigė
  #    - kai ESO pasibaigia arba prasideda naktinis tarifas
  #    - jei abu ON -> nustatom rezervą pagal helperį 01_charging_eso_kiek_krauti
  #    - nevykdyti šeštadienio ir sekmadienio naktimis (savaitgalį visą parą
  #      naktinis tarifas, todėl nereikia specialiai „įeiti" į naktį)
  ###########################################################################
  - alias: "Charging – naktinis krovimas, kai ESO pasibaigė"
    id: charging_night_charge_when_eso_exhausted
    triggers:
      - trigger: state
        entity_id:
          - binary_sensor.charging_eso_sukaupta_elektra_pasibaige
          - binary_sensor.charging_naktinis_tinklo_tarifas
        to: "on"
    conditions:
      - condition: state
        entity_id: binary_sensor.charging_eso_sukaupta_elektra_pasibaige
        state: "on"
      - condition: state
        entity_id: binary_sensor.charging_naktinis_tinklo_tarifas
        state: "on"
      - condition: state
        entity_id: switch.grid_time_of_use_charging_period_1
        state: "off"
      # Savaitgalio naktims nevykdyti: penktadienio → šeštadienio ir šeštadienio → sekmadienio
      # Vidurnaktis 00:00: šeštadienis=5, sekmadienis=6
      # (weekday: 0=pirmadienis … 4=penktadienis, 5=šeštadienis, 6=sekmadienis)
      - condition: template
        value_template: "{{ now().weekday() not in [5, 6] }}"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.akumuliatoriaus_rezervavimas_vasarai
        data:
          value: "{{ states('input_number.01_charging_eso_kiek_krauti') | float(95) }}"
    mode: restart

  ###########################################################################
  # 3) ESO likutis tapo teigiamas (eksportas viršijo importą)
  #    - grąžinam rezervą į helperio reikšmę
  #    - išjungiam tinklo krovimą, jei buvo įjungtas
  ###########################################################################
  - alias: "Charging – ESO likutis tapo teigiamas: atstatyti rezervą"
    id: charging_eso_balance_positive_restore
    triggers:
      - trigger: state
        entity_id: binary_sensor.charging_eso_sukaupta_elektra_pasibaige
        to: "off"
    conditions: []
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.akumuliatoriaus_rezervavimas_vasarai
        data:
          value: "{{ states('input_number.charging_battery_reserve_after_eso') | float(20) }}"
      - action: switch.turn_off
        target:
          entity_id: switch.grid_time_of_use_charging_period_1
    mode: single

  ###########################################################################
  # 4) Dieninio tarifo pradžia, kai ESO pasibaigė
  #    - backup SOC nustatom iš helperio "Baterijos rezervavimas pasibaigus sukauptai ESO"
  ###########################################################################
  - alias: "Charging – dieninis tarifas, kai ESO pasibaigė"
    id: charging_day_tariff_after_eso
    triggers:
      - trigger: state
        entity_id: binary_sensor.charging_dieninis_tinklo_tarifas
        to: "on"
    conditions:
      - condition: state
        entity_id: binary_sensor.charging_eso_sukaupta_elektra_pasibaige
        state: "on"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.akumuliatoriaus_rezervavimas_vasarai
        data:
          value: "{{ states('input_number.charging_battery_reserve_after_eso') | float(20) }}"
    mode: single
