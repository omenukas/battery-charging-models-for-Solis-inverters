###############################################################################
# PACKAGE: 03_charging_vasara_ziema
#
# PASKIRTIS:
#   Valdyti saulės elektrinės akumuliatoriaus krovimo strategiją priklausomai
#   nuo sezono (vasara / žiema) ir Solcast saulės prognozės.
#
# PAGRINDINĖ LOGIKA:
#   • Žiemos režimas (ziemos_rezimas_elektrinei = ON):
#       - Akumuliatorius laikomas aukšto rezervo lygyje (akumuliatoriaus_rezervavimas)
#       - Feed-in priority išjungtas – elektra naudojama namų reikmėms
#       - Periodiškai (pagal intervalą) baterija įkraunama iki 100% iš tinklo,
#         kad būtų užtikrintas pilnas ciklas baterijos sveikatai
#
#   • Vasaros režimas (ziemos_rezimas_elektrinei = OFF):
#       - Kiekvieną valandą nuo 06:00 iki 13:00 tikrinama Solcast dienos prognozė
#       - Jei prognozė MAŽA (< reakcija_i_gamybos_prognoze): Self use
#         (baterija kraunama nuo saulės, elektra neparduodama)
#       - Jei prognozė DIDELĖ (>= reakcija_i_gamybos_prognoze): Feed-in priority
#         (perteklinė elektra parduodama į tinklą)
#       - Apsauga ryte: jei SOC < 50%, pirma pakrauname bateriją iki 50%,
#         tuomet grįžtame prie prognozės logikos
#       - Apsauga vakare: nustatytu laiku (reakcija_i_laika), jei SOC < 100%,
#         perjungiama į Self use, kad baterija būtų pakrauta iki nakties
#
# REIKALINGI HELPERIAI (aprašyti šiame package):
#   input_boolean:
#     • ziemos_rezimas_elektrinei        – pagrindinis sezono perjungiklis
#     • akumuliatoriu_rankinis_rezervavimas – blokuoti automatinį rezervo keitimą
#     • reserve_battery_mode_before_winter  – išsaugoti Reserve Battery Mode būseną
#     • reserve_battery_mode_before_outage  – išsaugoti Reserve Battery Mode būseną
#   input_number:
#     • reakcija_i_gamybos_prognoze      – Solcast prognozės riba kWh (pvz. 10)
#     • reakcija_i_dienos_max_generacija – maksimalios generacijos riba W (rezervinis)
#     • solis_krovimo2_dienu_intervalas  – kas kiek dienų vykdyti periodinį krovimą
#     • akumuliatoriaus_rezervavimas     – žiemos backup SOC %
#     • akumuliatoriaus_rezervavimas_vasarai – aktyvus vasaros backup SOC %
#   input_datetime:
#     • reakcija_i_laika                 – laikas, po kurio perjungiama į Self use
#     • solis_krovimo2_laikas            – periodinio krovimo pradžios laikas
#     • solis_krovimo2_paskutinis_vykdymas – paskutinio krovimo data
#     • eso_pradzia / eso_pabaiga        – ESO planinio atjungimo laikas
#   input_text:
#     • eso_pavadinimas                  – ESO atjungimo įvykio pavadinimas
#   input_button:
#     • eso_sukurti                      – sukurti ESO įvykį kalendoriuje
#
# IŠORINIAI SENSORIAI (turi būti įdiegti atskirai):
#   • sensor.solcast_pv_forecast_forecast_today – Solcast integracija
#   • sensor.solis_s6_eh3p_battery_soc          – Solis inverterio SOC
#   • sensor.solis_s6_eh3p_*_phase_voltage      – fazių įtampa (ESO atjungimui)
#   • switch.feed_in_priority_mode              – Solis Feed-in priority režimas
#   • switch.reserve_battery_mode              – Solis Reserve Battery Mode
#   • switch.grid_time_of_use_charging_period_1/2 – Solis tinklo krovimo periodai
#   • number.solis_s6_eh3p_backup_soc          – Solis backup SOC nustatymas
#   • calendar.eso_planiniai_darbai            – ESO planinių darbų kalendorius
###############################################################################

input_boolean:
  # Pagrindinis žiemos/vasaros režimo perjungiklis.
  # ON  = žiemos režimas: aukštas rezervas, periodinis krovimas, Feed-in išjungtas
  # OFF = vasaros režimas: dinaminė Solcast logika, Feed-in pagal prognozę
  ziemos_rezimas_elektrinei:
    name: "Charging3 - Žiemos režimas elektrinei"
    icon: mdi:snowflake

  # Apsauginis perjungiklis, blokuojantis automatinį backup SOC keitimą.
  # Naudojamas ESO planinio atjungimo metu, kad kiti procesai netrukdytų.
  akumuliatoriu_rankinis_rezervavimas:
    name: "Charging3 - Akumuliatorių rankinis rezervavimas"
    icon: mdi:shield-battery

  # Išsaugo Reserve Battery Mode būseną prieš įjungiant žiemos režimą,
  # kad ją būtų galima atstatyti išjungus žiemos režimą.
  reserve_battery_mode_before_winter:
    name: "Charging3 - Reserve Battery Mode – išsaugota būsena"
    icon: mdi:battery-lock

  # Išsaugo Reserve Battery Mode būseną prieš ESO planinį atjungimą,
  # kad ją būtų galima atstatyti po atjungimo.
  reserve_battery_mode_before_outage:
    name: "Charging3 - Solis Reserve Battery Mode – prieš ESO atjungimą"
    icon: mdi:battery-lock

input_number:
  # Solcast dienos prognozės slenkstis kWh.
  # Jei prognozė >= šios reikšmės → Feed-in priority (parduodama į tinklą).
  # Jei prognozė < šios reikšmės  → Self use (elektra naudojama namams).
  reakcija_i_gamybos_prognoze:
    name: "Charging3 - Solis reakcija į gamybos prognozę"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: kWh
    icon: mdi:weather-sunny-alert
    mode: box

  # Rezervinis parametras maksimaliai dienos generacijai W.
  # Šiuo metu nenaudojamas aktyviai – paliktas ateičiai.
  reakcija_i_dienos_max_generacija:
    name: "Charging3 - Solis reakcija į dienos max generaciją"
    min: 0
    max: 30000
    step: 1
    unit_of_measurement: W
    mode: box
    icon: mdi:weather-sunny

  # Kas kiek dienų vykdyti periodinį žiemos krovimą iki 100%.
  # Rekomenduojama 14–30 dienų baterijos sveikatai palaikyti.
  solis_krovimo2_dienu_intervalas:
    name: "Charging3 - Solis krovimo dienų intervalas"
    min: 1
    max: 100
    step: 1
    unit_of_measurement: d
    icon: mdi:calendar-range
    mode: box

  # Backup SOC % žiemos režimu – inverteris šį lygį laiko kaip minimalų rezervą.
  # Rekomenduojama 20–40% žiemą, kad baterija išliktų avariniam naudojimui.
  akumuliatoriaus_rezervavimas:
    name: "Charging3 - Solis akumuliatoriaus rezervavimas"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:snowflake
    mode: box

  # Aktyvus backup SOC % vasaros režimu – dinamiškai keičiamas automatizacijų.
  # Keičia 01_charging_eso.yaml automatizacijos (ESO logika) ir šio package automatizacijos.
  akumuliatoriaus_rezervavimas_vasarai:
    name: "Charging3 - Solis akumuliatoriaus rezervavimas vasarai"
    min: 0
    max: 100
    step: 1
    unit_of_measurement: "%"
    icon: mdi:weather-sunny
    mode: box

input_datetime:
  # Laikas, po kurio vakare perjungiama į Self use, jei SOC < 100%.
  # Tikslas – užtikrinti, kad baterija spėtų įsikrauti iki saulėlydžio.
  # Rekomenduojama nustatyti apie 13:00–14:00.
  reakcija_i_laika:
    name: "Charging3 - Reakcija į laiką"
    has_date: false
    has_time: true
    icon: mdi:clock-outline

  # ESO planinio atjungimo pradžia (naudojama ESO automatizacijos).
  eso_pradzia:
    name: "Charging3 - ESO pradžia"
    has_date: true
    has_time: true
    icon: mdi:calendar-start

  # ESO planinio atjungimo pabaiga (naudojama ESO automatizacijos).
  eso_pabaiga:
    name: "Charging3 - ESO pabaiga"
    has_date: true
    has_time: true
    icon: mdi:calendar-end

  # Periodinio žiemos krovimo pradžios laikas (pvz. 02:00 naktinio tarifo metu).
  solis_krovimo2_laikas:
    name: "Charging3 - Solis krovimo 2 laikas"
    has_date: false
    has_time: true
    icon: mdi:solar-power-variant

  # Automatiškai įrašoma paskutinio periodinio krovimo data.
  # Naudojama intervalui skaičiuoti.
  solis_krovimo2_paskutinis_vykdymas:
    name: "Charging3 - Solis krovimo 2 paskutinis vykdymas"
    has_date: true
    has_time: false
    icon: mdi:history

input_text:
  # ESO planinio atjungimo įvykio pavadinimas kalendoriuje.
  eso_pavadinimas:
    name: "Charging3 - Solis ESO įvykio pavadinimas"
    icon: mdi:calendar-text

input_button:
  # Mygtukas sukurti ESO planinį įvykį kalendoriuje iš HA kortelės.
  eso_sukurti:
    name: "Charging3 - Sukurti ESO įvykį"
    icon: mdi:calendar-plus

automation:
  ###########################################################################
  # AUTOMATIZACIJA 1: Dinaminė saulės logika pagal Solcast prognozę
  #
  # VEIKIA TIK vasaros režimu (ziemos_rezimas_elektrinei = OFF)
  #
  # TRIGERIAI:
  #   • Kas valandą nuo 06:00 iki 13:00 (id: hourly)
  #   • Kai SOC pakyla virš 50% dienos metu (id: soc_50_reached)
  #   • Nustatytu vakaro laiku reakcija_i_laika (id: time_cutoff)
  #
  # SPRENDIMO MEDIS:
  #   1. time_cutoff suveikia + SOC < 100%
  #      → Self use (baterija turi įsikrauti prieš naktį)
  #
  #   2. hourly suveikia + SOC < 50%
  #      → Self use (ryte baterija per žema, pirma prikrauname iki 50%)
  #
  #   3. soc_50_reached suveikia (SOC ką tik pasiekė 50%)
  #      → Vykdoma prognozės logika: maža prognozė → Self use,
  #                                  didelė prognozė → Feed-in priority
  #
  #   4. hourly suveikia + SOC >= 50% + prognozė MAŽA
  #      → Self use
  #
  #   5. hourly suveikia + SOC >= 50% + prognozė DIDELĖ
  #      → Feed-in priority (Selling first)
  ###########################################################################
  - alias: "Charging3 – dinaminė saulės logika pagal Solcast"
    id: charging3_dynamic_solar_logic
    triggers:
      - trigger: time
        at: "06:00:00"
        id: hourly
      - trigger: time
        at: "07:00:00"
        id: hourly
      - trigger: time
        at: "08:00:00"
        id: hourly
      - trigger: time
        at: "09:00:00"
        id: hourly
      - trigger: time
        at: "10:00:00"
        id: hourly
      - trigger: time
        at: "11:00:00"
        id: hourly
      - trigger: time
        at: "12:00:00"
        id: hourly
      - trigger: time
        at: "13:00:00"
        id: hourly
      - trigger: time
        at: input_datetime.reakcija_i_laika
        id: time_cutoff
      # Kai SOC pakyla virš 50% dienos metu – grįžtame prie prognozės logikos
      - trigger: numeric_state
        entity_id: sensor.solis_s6_eh3p_battery_soc
        above: 50
        id: soc_50_reached
    conditions:
      - condition: state
        entity_id: input_boolean.ziemos_rezimas_elektrinei
        state: "off"
      # soc_50_reached trigeris aktualus tik dienos metu (06–13h)
      - condition: template
        value_template: >-
          {{ trigger.id != 'soc_50_reached' or (now().hour >= 6 and now().hour <= 13) }}
    variables:
      prognose: "{{ states('sensor.solcast_pv_forecast_forecast_today') | float(0) }}"
      prognozos_riba: "{{ states('input_number.reakcija_i_gamybos_prognoze') | float(0) }}"
      soc: "{{ states('sensor.solis_s6_eh3p_battery_soc') | float(0) }}"
    actions:
      - choose:
          # Nustatytu laiku: jei baterija nepilna -> Self use
          - conditions:
              - condition: trigger
                id: time_cutoff
              - condition: template
                value_template: "{{ soc < 100 }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.feed_in_priority_mode

          # SOC < 50% (valandinis tikrinimas) -> Self use, laukiame 50%
          - conditions:
              - condition: trigger
                id: hourly
              - condition: template
                value_template: "{{ soc < 50 }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.feed_in_priority_mode

          # SOC pasiekė 50% -> vykdome prognozės logiką
          - conditions:
              - condition: trigger
                id: soc_50_reached
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ prognose < prognozos_riba }}"
                    sequence:
                      - action: switch.turn_off
                        target:
                          entity_id: switch.feed_in_priority_mode
                default:
                  - action: switch.turn_on
                    target:
                      entity_id: switch.feed_in_priority_mode

          # Kas valandą, SOC >= 50%: prognozė MAŽA -> Self use
          - conditions:
              - condition: trigger
                id: hourly
              - condition: template
                value_template: "{{ soc >= 50 and prognose < prognozos_riba }}"
            sequence:
              - action: switch.turn_off
                target:
                  entity_id: switch.feed_in_priority_mode

          # Kas valandą, SOC >= 50%: prognozė DIDELĖ -> Selling first
          - conditions:
              - condition: trigger
                id: hourly
              - condition: template
                value_template: "{{ soc >= 50 and prognose >= prognozos_riba }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: switch.feed_in_priority_mode
    mode: single

  ###########################################################################
  # AUTOMATIZACIJA 2: ESO planinio atjungimo įvykio kūrimas iš HA kortelės
  #
  # Trigeris: paspaudžiamas mygtukas input_button.eso_sukurti
  # Sąlyga:   pradžios laikas turi būti anksčiau už pabaigos laiką
  # Veiksmas: sukuriamas įvykis Google/HA kalendoriuje eso_planiniai_darbai
  #
  # Naudojimas: HA kortelėje nustatykite pradžios/pabaigos laiką ir įvykio
  #             pavadinimą, tada paspauskite mygtuką.
  ###########################################################################
  - alias: Charging3 - ESO – sukurti įvykį iš kortelės
    description: ""
    triggers:
      - entity_id: input_button.eso_sukurti
        trigger: state
    conditions:
      - condition: template
        value_template: |-
          {{ as_datetime(states('input_datetime.eso_pradzia'))
              < as_datetime(states('input_datetime.eso_pabaiga')) }}
    actions:
      - target:
          entity_id: calendar.eso_planiniai_darbai
        data:
          summary: "{{ states('input_text.eso_pavadinimas') or 'ESO atjungimas' }}"
          start_date_time: "{{ states('input_datetime.eso_pradzia') }}"
          end_date_time: "{{ states('input_datetime.eso_pabaiga') }}"
          description: Planinis ESO atjungimas (sukurta iš kortelės)
        action: calendar.create_event
    mode: single

  ###########################################################################
  # AUTOMATIZACIJA 3: ESO planinio atjungimo pasiruošimas ir atstatymas
  #
  # PASKIRTIS: kai ESO planuoja atjungti elektrą, iš anksto:
  #   1. Pakraunama baterija iki 100% iš tinklo
  #   2. Įjungiamas Reserve Battery Mode (kad baterija išlaikytų namus atjungimo metu)
  #   3. Po atjungimo pabaigos – viskas atstatoma į pradinę būseną
  #
  # TRIGERIAI:
  #   • Kiekvieną vidurnaktį (00:00:30) – patikrinama ar šiandien yra įvykis
  #   • HA paleidimas – apsauga, jei paleidimas sutampa su atjungimo diena
  #   • Kalendoriaus įvykio būsenos pasikeitimas – greita reakcija į naują įvykį
  #
  # SĄLYGOS:
  #   • Šiandien turi būti ESO planinis įvykis kalendoriuje
  #   • Automatizacija šiandien dar neturėjo būti vykdyta (anti-duplicate apsauga)
  #
  # VEIKSMŲ SEKA:
  #   1. Išsaugoma dabartinė Reserve Battery Mode būsena
  #   2. Įjungiamas tinklo krovimas (grid_time_of_use_charging_period_1)
  #   3. Backup SOC nustatomas į 100%
  #   4. Laukiama kol SOC = 100% arba prasideda atjungimas
  #   5. Išjungiamas tinklo krovimas
  #   6. Laukiama kol fazių įtampa nukrenta iki 0 (ESO atjungė) arba įvykis baigiasi
  #   7. Atstatoma ankstesnė Reserve Battery Mode būsena
  #   8. Atstatomas ankstesnis Backup SOC lygis
  ###########################################################################
  - alias: Charging3 -ESO planinis atjungimas – pasiruošimas ir atstatymas
    description: ""
    triggers:
      - at: "00:00:30"
        id: midnight
        trigger: time
      - event: start
        id: ha_start
        trigger: homeassistant
      - entity_id: calendar.eso_planiniai_darbai
        id: cal_update
        trigger: state
    conditions:
      - condition: template
        value_template: "{{ today_has_event }}"
      - condition: template
        value_template: |
          {{ this.attributes.last_triggered is none
              or as_local(this.attributes.last_triggered).date() != now().date() }}
    actions:
      - if:
          - condition: trigger
            id: ha_start
        then:
          - delay: "00:00:20"
      - choose:
          - conditions:
              - condition: state
                entity_id: switch.reserve_battery_mode
                state: "on"
            sequence:
              - target:
                  entity_id: input_boolean.reserve_battery_mode_before_outage
                action: input_boolean.turn_on
        default:
          - target:
              entity_id: input_boolean.reserve_battery_mode_before_outage
            action: input_boolean.turn_off
      - target:
          entity_id: switch.grid_time_of_use_charging_period_1
        action: switch.turn_on
      - target:
          entity_id: input_boolean.akumuliatoriu_rankinis_rezervavimas
        action: input_boolean.turn_on
      - target:
          entity_id: switch.reserve_battery_mode
        action: switch.turn_on
      - target:
          entity_id: number.solis_s6_eh3p_backup_soc
        data:
          value: 100
        action: number.set_value
      - wait_template: >
          {{
          (states('sensor.solis_s6_eh3p_battery_soc')|float(0)
          >= 100)
              or (event_end_ts is not none and now().timestamp() >= event_end_ts) }}
      - if:
          - condition: template
            value_template: >-
              {{
              states('sensor.solis_s6_eh3p_battery_soc')|float(0)
              >= 100 }}
        then:
          - target:
              entity_id: switch.grid_time_of_use_charging_period_1
            action: switch.turn_off
      - wait_template: >-
          {% set a = states('sensor.solis_s6_eh3p_a_phase_voltage')|float(999) %}
          {% set b = states('sensor.solis_s6_eh3p_b_phase_voltage')|float(999) %}
          {% set c = states('sensor.solis_s6_eh3p_c_phase_voltage')|float(999) %}
          {{ (a == 0 or b == 0 or c == 0)
              or (event_end_ts is not none and now().timestamp() >= event_end_ts) }}
      - target:
          entity_id: input_boolean.akumuliatoriu_rankinis_rezervavimas
        action: input_boolean.turn_off
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.reserve_battery_mode_before_outage
                state: "on"
            sequence:
              - target:
                  entity_id: switch.reserve_battery_mode
                action: switch.turn_on
        default:
          - target:
              entity_id: switch.reserve_battery_mode
            action: switch.turn_off
      - target:
          entity_id: number.solis_s6_eh3p_backup_soc
        data:
          value: "{{ old_backup|float(0) }}"
        action: number.set_value
      - target:
          entity_id: switch.grid_time_of_use_charging_period_1
        action: switch.turn_off
    mode: single
    initial_state: true
    variables:
      event_start_raw: "{{ state_attr('calendar.eso_planiniai_darbai', 'start_time') }}"
      event_end_raw: "{{ state_attr('calendar.eso_planiniai_darbai', 'end_time') }}"
      today_has_event: |
        {{ event_start_raw is not none and 
            as_local(as_datetime(event_start_raw)).date() == now().date() }}
      event_end_ts: >
        {{ as_timestamp(as_local(as_datetime(event_end_raw))) if event_end_raw else
        none }}
      old_backup: >-
        {{ states('number.solis_s6_eh3p_backup_soc')|float(0)
        }}

  ###########################################################################
  # AUTOMATIZACIJA 4: Periodinis žiemos krovimas iki 100%
  #
  # PASKIRTIS: Žiemos metu periodiškai (kas N dienų) pakrauti bateriją iki 100%,
  #   tada iškrauti iki minimalaus rezervo lygio ir grąžinti į normalų rezervą.
  #   Tai svarbu baterijos sveikatai – pilnas ciklas prailgina tarnavimo laiką.
  #
  # VEIKIA TIK žiemos režimu (ziemos_rezimas_elektrinei = ON)
  #
  # VEIKSMŲ SEKA:
  #   1. Backup SOC nustatomas į 100% (inverteris kraus bateriją iki maksimumo)
  #   2. Įjungiamas tinklo krovimas (grid_time_of_use_charging_period_2)
  #   3. Įrašoma šiandienos data kaip paskutinio krovimo data
  #   4. Laukiama kol SOC >= 98% (timeout: 12h)
  #   5. Išjungiamas tinklo krovimas
  #   6. Po 30 min. Backup SOC sumažinamas iki 20% (inverteris leis baterijai iškrauti)
  #   7. Laukiama kol SOC <= 20% (timeout: 7 dienų)
  #   8. Backup SOC grąžinamas į normalią žiemos reikšmę
  ###########################################################################
  - alias: Charging3 – periodinis krovimas
    description: " (žiemą iki 100%)"
    triggers:
      - at: input_datetime.solis_krovimo2_laikas
        trigger: time

    conditions:
      - condition: state
        entity_id: input_boolean.ziemos_rezimas_elektrinei
        state: "on"
      - condition: template
        value_template: >-
          {% set last = states('input_datetime.solis_krovimo2_paskutinis_vykdymas') %}
          {% set interval = states('input_number.solis_krovimo2_dienu_intervalas')|int(1) %}
          {% if last in ['unknown','unavailable',''] %}
            true
          {% else %}
            {% set d_last = as_datetime(last).date() %}
            {{ (now().date() - d_last).days >= interval }}
          {% endif %}

    variables:
      rezervas_akum: "{{ states('input_number.akumuliatoriaus_rezervavimas')|float(0) }}"

    actions:
      - target:
          entity_id: input_number.akumuliatoriaus_rezervavimas
        data:
          value: 100
        action: input_number.set_value

      - target:
          entity_id: switch.grid_time_of_use_charging_period_2
        action: switch.turn_on

      - target:
          entity_id: input_datetime.solis_krovimo2_paskutinis_vykdymas
        data:
          date: "{{ now().date() }}"
        action: input_datetime.set_datetime

      - wait_template: >-
          {{ states('sensor.solis_s6_eh3p_battery_soc')|float(0) >= 98 }}
        timeout: "12:00:00"
        continue_on_timeout: false

      - target:
          entity_id: switch.grid_time_of_use_charging_period_2
        action: switch.turn_off

      - delay:
          minutes: 30

      - target:
          entity_id: input_number.akumuliatoriaus_rezervavimas
        data:
          value: 20
        action: input_number.set_value

      - wait_template: >-
          {{ states('sensor.solis_s6_eh3p_battery_soc')|float(0) <= 20 }}
        timeout: "168:00:00"
        continue_on_timeout: false

      - target:
          entity_id: input_number.akumuliatoriaus_rezervavimas
        data:
          value: "{{ rezervas_akum }}"
        action: input_number.set_value

    mode: single

  ###########################################################################
  # AUTOMATIZACIJA 5: Žiemos/vasaros režimo rezervo valdymas
  #
  # PASKIRTIS: Sinchronizuoti inverterio Backup SOC ir Reserve Battery Mode
  #   su žiemos/vasaros perjungikliu bei helperių reikšmėmis.
  #
  # TRIGERIAI:
  #   • Žiemos režimas įjungtas (winter_on)
  #   • Žiemos režimas išjungtas (winter_off)
  #   • Pakeistos helperių reikšmės akumuliatoriaus_rezervavimas arba
  #     akumuliatoriaus_rezervavimas_vasarai (reserve_numbers_changed)
  #   • HA paleidimas (hass_start) – sinchronizacija po perkrovimo
  #
  # SĄLYGA: akumuliatoriu_rankinis_rezervavimas = OFF
  #   (jei rankinis režimas įjungtas, automatizacija neveikia)
  #
  # VEIKSMŲ LOGIKA:
  #   • winter_on:  Backup SOC = akumuliatoriaus_rezervavimas,
  #                 Reserve Battery Mode = ON, Feed-in priority = OFF
  #   • winter_off: Backup SOC = akumuliatoriaus_rezervavimas_vasarai,
  #                 Reserve Battery Mode = grąžinama į ankstesnę būseną
  #   • reserve_numbers_changed + žiema: atnaujinamas Backup SOC iš žiemos helperio
  #   • reserve_numbers_changed + vasara: atnaujinamas Backup SOC iš vasaros helperio
  #   • hass_start: sinchronizuojama pagal dabartinį režimą
  ###########################################################################
  - alias: Charging3 - Žiemos režimo rezervas
    triggers:
      - entity_id: input_boolean.ziemos_rezimas_elektrinei
        to: "on"
        id: winter_on
        trigger: state
      - entity_id: input_boolean.ziemos_rezimas_elektrinei
        to: "off"
        id: winter_off
        trigger: state
      - entity_id:
          - input_number.akumuliatoriaus_rezervavimas
          - input_number.akumuliatoriaus_rezervavimas_vasarai
        id: reserve_numbers_changed
        trigger: state
      - event: start
        id: hass_start
        trigger: homeassistant
    conditions:
      - condition: state
        entity_id: input_boolean.akumuliatoriu_rankinis_rezervavimas
        state: "off"
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: winter_on
            sequence:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: switch.reserve_battery_mode
                        state: "on"
                    sequence:
                      - target:
                          entity_id: input_boolean.reserve_battery_mode_before_winter
                        action: input_boolean.turn_on
                default:
                  - target:
                      entity_id: input_boolean.reserve_battery_mode_before_winter
                    action: input_boolean.turn_off
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{ states('input_number.akumuliatoriaus_rezervavimas')|float(0)
                    }}
                action: number.set_value
              - target:
                  entity_id: switch.feed_in_priority_mode
                action: switch.turn_off
              - target:
                  entity_id: switch.reserve_battery_mode
                action: switch.turn_on
          - conditions:
              - condition: trigger
                id: winter_off
            sequence:
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{
                    states('input_number.akumuliatoriaus_rezervavimas_vasarai')|float(0)
                    }}
                action: number.set_value
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.reserve_battery_mode_before_winter
                        state: "on"
                    sequence:
                      - target:
                          entity_id: switch.reserve_battery_mode
                        action: switch.turn_on
                default:
                  - target:
                      entity_id: switch.reserve_battery_mode
                    action: switch.turn_off
          - conditions:
              - condition: trigger
                id: reserve_numbers_changed
              - condition: state
                entity_id: input_boolean.ziemos_rezimas_elektrinei
                state: "on"
            sequence:
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{ states('input_number.akumuliatoriaus_rezervavimas')|float(0)
                    }}
                action: number.set_value
              - target:
                  entity_id: switch.reserve_battery_mode
                action: switch.turn_on
          - conditions:
              - condition: trigger
                id: reserve_numbers_changed
              - condition: state
                entity_id: input_boolean.ziemos_rezimas_elektrinei
                state: "off"
            sequence:
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{
                    states('input_number.akumuliatoriaus_rezervavimas_vasarai')|float(0)
                    }}
                action: number.set_value
          - conditions:
              - condition: trigger
                id: hass_start
              - condition: state
                entity_id: input_boolean.ziemos_rezimas_elektrinei
                state: "on"
            sequence:
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{ states('input_number.akumuliatoriaus_rezervavimas')|float(0)
                    }}
                action: number.set_value
              - target:
                  entity_id: switch.feed_in_priority_mode
                action: switch.turn_off
              - target:
                  entity_id: switch.reserve_battery_mode
                action: switch.turn_on
          - conditions:
              - condition: trigger
                id: hass_start
              - condition: state
                entity_id: input_boolean.ziemos_rezimas_elektrinei
                state: "off"
            sequence:
              - target:
                  entity_id: number.solis_s6_eh3p_backup_soc
                data:
                  value: >-
                    {{
                    states('input_number.akumuliatoriaus_rezervavimas_vasarai')|float(0)
                    }}
                action: number.set_value
    mode: restart
